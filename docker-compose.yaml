services:
  oauth2-api:
    build: 
      dockerfile: dockerfile
    ports:
      - "${DOCKER_API_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy     
    develop: 
      watch:
        - action: rebuild
          path: ./    

  redis: 
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - ${DOCKER_REDIS_INSIGTH_PORT:-8001}:8001
    environment:
      - REDIS_ARGS=--user default off --user ${REDIS_USERNAME:-admin} on >${REDIS_PASSWORD:-admin} ~* +@all
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "${REDIS_USERNAME:-admin}", "-a", "${REDIS_PASSWORD:-admin}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    ports:
      - "5433:5432" 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5