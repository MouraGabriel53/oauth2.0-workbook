services:
  oauth2-api:
    build: 
      context: .
      dockerfile: dockerfile
      args:
        - DOCKER_GOLANG_VERSION=${DOCKER_GOLANG_VERSION}
        - DOCKER_API_USER=${DOCKER_API_USER}
        - DOCKER_API_PORT=${DOCKER_API_PORT}
    ports:
      - "${DOCKER_API_PORT}:${DOCKER_API_PORT}"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  redis: 
    image: redis/redis-stack:latest
    restart: unless-stopped
    ports:
      - ${DOCKER_REDIS_PORT}:6379
      - ${DOCKER_REDIS_INSIGTH_PORT}:8001
    environment:
      - REDIS_ARGS=--user default off --user ${REDIS_USERNAME} on >${REDIS_PASSWORD} ~* +@all
    # volumes:
    #   - redis_cache:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "${REDIS_USERNAME}", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

